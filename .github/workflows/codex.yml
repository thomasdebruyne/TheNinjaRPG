name: Codex

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  codex:
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@codex')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@codex')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@codex')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@codex') || contains(github.event.issue.title, '@codex')))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Build prompt from event context
        id: build_prompt
        uses: actions/github-script@v7
        with:
          script: |
            let prompt = '';
            const event = context.eventName;

            if (event === 'issue_comment') {
              prompt = `GitHub issue #${context.issue.number} in ${context.repo.owner}/${context.repo.repo}.

            Issue title: ${context.payload.issue.title}
            Issue body:
            ${context.payload.issue.body || '(empty)'}

            Comment by @${context.payload.comment.user.login}:
            ${context.payload.comment.body}

            Please respond to the comment above. If asked to implement something, do so.`;
            } else if (event === 'pull_request_review_comment') {
              prompt = `GitHub PR #${context.issue.number} review comment in ${context.repo.owner}/${context.repo.repo}.

            Comment by @${context.payload.comment.user.login} on file ${context.payload.comment.path}:
            ${context.payload.comment.body}

            Please respond to the review comment above.`;
            } else if (event === 'pull_request_review') {
              prompt = `GitHub PR #${context.issue.number} review in ${context.repo.owner}/${context.repo.repo}.

            Review by @${context.payload.review.user.login} (${context.payload.review.state}):
            ${context.payload.review.body}

            Please respond to the review above.`;
            } else if (event === 'issues') {
              prompt = `GitHub issue #${context.issue.number} in ${context.repo.owner}/${context.repo.repo}.

            Issue title: ${context.payload.issue.title}
            Issue body:
            ${context.payload.issue.body || '(empty)'}

            Please review and respond to this issue.`;
            }

            const fs = require('fs');
            fs.writeFileSync('/tmp/codex_prompt.txt', prompt);

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.AZURE_API_KEY }}
          responses-api-endpoint: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          model: "gpt-5.4"
          prompt-file: /tmp/codex_prompt.txt

  post_feedback:
    runs-on: ubuntu-latest
    needs: codex
    if: needs.codex.outputs.final_message != ''
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Post Codex response
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const body = `**Codex Response:**\n\n${process.env.CODEX_FINAL_MESSAGE}`;
            const issueNumber = context.issue?.number || context.payload?.pull_request?.number;

            if (issueNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: body
              });
            }
