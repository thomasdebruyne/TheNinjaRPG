# TNR Reviewer — launches a Codex agent with Playwright MCP against a Vercel
# preview deployment to smoke-test a PR from a player's perspective.
#
# Triggers:
#   • `/tnr-review-now [extra instructions]` comment on any PR
#   • Manual workflow_dispatch with a PR number
#
# Pipeline: command_gate → preview_check → run_tnr_reviewer
#   1. command_gate: validates the trigger, checks actor permissions, fetches PR metadata
#   2. preview_check: waits for a successful Vercel deployment check and extracts the URL
#   3. run_tnr_reviewer: checks out the PR, builds a prompt, runs Codex, posts results
name: TNR Reviewer

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number
      extra_instructions:
        description: "Optional additional test instructions for the reviewer"
        required: false
        type: string

env:
  MODE: pr-review

jobs:
  # ── Job 1: Parse the trigger, enforce actor allowlist, fetch PR metadata ──
  command_gate:
    # Quick filter: only fire on PR comments containing the slash command,
    # or on manual workflow_dispatch. This avoids spinning up runners for
    # unrelated issue comments.
    if: >-
      (github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/tnr-review-now')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ${{ vars.TNR_REVIEWER_RUNNER_LABEL || 'blacksmith-2vcpu-ubuntu-2404' }}
    permissions:
      issues: write
      pull-requests: write
      checks: read
      contents: read
    outputs:
      should_run: ${{ steps.parse.outputs.should_run }}
      pr_number: ${{ steps.parse.outputs.pr_number }}
      issue_number: ${{ steps.parse.outputs.issue_number }}
      comment_id: ${{ steps.initial_comment.outputs.comment_id }}
      head_sha: ${{ steps.parse.outputs.head_sha }}
      pr_title: ${{ steps.parse.outputs.pr_title }}
      pr_body: ${{ steps.parse.outputs.pr_body }}
      pr_author: ${{ steps.parse.outputs.pr_author }}
      extra_instructions: ${{ steps.parse.outputs.extra_instructions }}
    steps:
      - name: Parse command and validate actor
        id: parse
        uses: actions/github-script@v8
        env:
          ALLOW_USERS: ${{ vars.TNR_REVIEWER_ALLOW_USERS }}
        with:
          script: |
            const isWorkflowDispatch = context.eventName === 'workflow_dispatch';

            // Normalise the two trigger shapes into a single actor + body + PR number
            const actor = isWorkflowDispatch
              ? context.actor
              : context.payload.comment.user.login;
            const issueNumber = isWorkflowDispatch
              ? Number(context.payload.inputs?.pr_number)
              : context.issue.number;
            // For workflow_dispatch we synthesise a slash-command body so the
            // same regex parsing works for both trigger types
            const body = isWorkflowDispatch
              ? `/tnr-review-now ${context.payload.inputs?.extra_instructions ?? ''}`
              : (context.payload.comment.body ?? '');

            // Extract the command and any trailing extra instructions
            const match = body.match(/\/tnr-review-now\b([\s\S]*)/i);
            if (!match || !Number.isInteger(issueNumber) || issueNumber <= 0) {
              core.setOutput('should_run', 'false');
              return;
            }

            // Actor allowlist — fail closed for issue_comment (require explicit config).
            // workflow_dispatch intentionally skips the empty-list guard because it
            // already requires repo write/admin access to trigger.
            const allowUsers = (process.env.ALLOW_USERS ?? '')
              .split(',')
              .map((value) => value.trim())
              .filter(Boolean);
            if (!isWorkflowDispatch && allowUsers.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: 'TNR reviewer is blocked: `TNR_REVIEWER_ALLOW_USERS` is not configured.',
              });
              core.setOutput('should_run', 'false');
              return;
            }
            if (allowUsers.length > 0 && !allowUsers.includes(actor)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `@${actor} is not allowed to trigger \`/tnr-review-now\`.`,
              });
              core.setOutput('should_run', 'false');
              return;
            }

            // Fetch full PR data (head SHA, title, body) for downstream jobs
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: issueNumber,
            });

            core.setOutput('should_run', 'true');
            core.setOutput('issue_number', String(issueNumber));
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('pr_title', pr.title ?? '');
            core.setOutput('pr_body', pr.body ?? '');
            core.setOutput('pr_author', pr.user?.login ?? '');
            core.setOutput('extra_instructions', (match[1] ?? '').trim());

      # Post a "started" comment that will be updated in-place with results later.
      # continue-on-error: true because GITHUB_TOKEN may lack issues:write on
      # some forks — we don't want a missing comment to abort the whole run.
      - name: Post initial comment
        if: steps.parse.outputs.should_run == 'true'
        id: initial_comment
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const issueNumber = Number('${{ steps.parse.outputs.issue_number }}');
            const { data: comment } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '## TNR reviewer started',
                '',
                'Mode: `pr-review`',
                'Command: `/tnr-review-now`',
                `Run: [View workflow run](${runUrl})`,
                '',
                '> This comment will be updated with findings and screenshot links.',
              ].join('\n'),
            });
            core.setOutput('comment_id', String(comment.id));

  # ── Job 2: Verify the Vercel preview is deployed and extract its URL ──
  preview_check:
    needs: command_gate
    if: needs.command_gate.outputs.should_run == 'true'
    runs-on: ${{ vars.TNR_REVIEWER_RUNNER_LABEL || 'blacksmith-2vcpu-ubuntu-2404' }}
    permissions:
      checks: read
      pull-requests: read
      issues: write
      contents: read
    outputs:
      is_ready: ${{ steps.check_preview.outputs.is_ready }}
      preview_url: ${{ steps.check_preview.outputs.preview_url }}
      reason: ${{ steps.check_preview.outputs.reason }}
      check_name: ${{ steps.check_preview.outputs.check_name }}
      details_url: ${{ steps.check_preview.outputs.details_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Check Vercel preview health
        id: check_preview
        run: node .github/scripts/check-preview-ready.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.command_gate.outputs.pr_number }}
          VERCEL_CHECK_NAME_PATTERN: ${{ vars.TNR_VERCEL_CHECK_PATTERN || 'vercel' }}

      # If the preview isn't ready, update the PR comment with the reason
      # so the user knows why the review was skipped
      - name: Post blocked reason
        if: steps.check_preview.outputs.is_ready != 'true'
        run: node .github/scripts/post-tnr-result.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ needs.command_gate.outputs.issue_number }}
          COMMENT_ID: ${{ needs.command_gate.outputs.comment_id }}
          RESULT: blocked
          MODE: ${{ env.MODE }}
          BLOCK_REASON: ${{ steps.check_preview.outputs.reason }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ── Job 3: Check out the PR, run the Codex reviewer, and post results ──
  run_tnr_reviewer:
    needs: [command_gate, preview_check]
    if: needs.preview_check.outputs.is_ready == 'true'
    runs-on: ${{ vars.TNR_REVIEWER_RUNNER_LABEL || 'blacksmith-2vcpu-ubuntu-2404' }}
    # One reviewer per PR at a time; don't cancel in-progress to avoid partial reports
    concurrency:
      group: tnr-reviewer-pr-${{ needs.command_gate.outputs.pr_number }}
      cancel-in-progress: false
    timeout-minutes: 45
    permissions:
      contents: read
      issues: write
      pull-requests: write
      checks: read
      actions: read
    steps:
      # First checkout: default branch scripts (trusted — not PR-controlled).
      # These run with secrets in env, so they MUST NOT come from the PR head.
      - name: Checkout trusted scripts
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          path: trusted-scripts

      - name: Cache trusted helper scripts
        run: |
          mkdir -p "$RUNNER_TEMP/tnr-scripts"
          cp trusted-scripts/.github/scripts/ci-helpers.mjs "$RUNNER_TEMP/tnr-scripts/"
          cp trusted-scripts/.github/scripts/build-tnr-review-prompt.mjs "$RUNNER_TEMP/tnr-scripts/"
          cp trusted-scripts/.github/scripts/post-tnr-result.mjs "$RUNNER_TEMP/tnr-scripts/"
          cp trusted-scripts/.github/scripts/upload-screenshots.mjs "$RUNNER_TEMP/tnr-scripts/"

      # Second checkout: PR head for Codex to inspect
      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.PAT_TOKEN }}
          ref: refs/pull/${{ needs.command_gate.outputs.pr_number }}/head

      # Set up Playwright MCP as a stdio server for Codex, plus artifact dirs.
      # No extraHTTPHeaders — those leak into cross-origin requests (Clerk JS)
      # and break auth. Vercel bypass is handled via query-param cookies instead.
      - name: Configure Codex MCP and artifacts
        shell: bash
        run: |
          mkdir -p .artifacts/tnr-review .artifacts/screenshots "$HOME/.codex"
          printf '%s\n' \
            '[mcp_servers.playwright]' \
            'command = "npx"' \
            'args = ["-y", "@playwright/mcp@0.0.70", "--headless"]' \
            'startup_timeout_sec = 30' \
            'tool_timeout_sec = 120' \
            > "$HOME/.codex/config.toml"
          echo "Codex config.toml:"
          cat "$HOME/.codex/config.toml"

      # Use the trusted script copy, not the PR-head version
      - name: Build review prompt
        id: build_prompt
        run: node "$RUNNER_TEMP/tnr-scripts/build-tnr-review-prompt.mjs"
        env:
          PROMPT_FILE: /tmp/tnr-review-prompt.txt
          PREVIEW_URL: ${{ needs.preview_check.outputs.preview_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          PR_NUMBER: ${{ needs.command_gate.outputs.pr_number }}
          PR_TITLE: ${{ needs.command_gate.outputs.pr_title }}
          PR_BODY: ${{ needs.command_gate.outputs.pr_body }}
          PR_AUTHOR: ${{ needs.command_gate.outputs.pr_author }}
          COMMAND_AUTHOR: ${{ github.actor }}
          REPOSITORY: ${{ github.repository }}
          EXTRA_INSTRUCTIONS: ${{ needs.command_gate.outputs.extra_instructions }}
          AI_TEST_USER_BROKER_TOKEN: ${{ secrets.AI_TEST_USER_BROKER_TOKEN }}

      # Non-blocking liveness probe — accepts any non-5xx response.
      # The Playwright agent handles Vercel bypass cookies natively.
      - name: Wait for Vercel deployment
        shell: bash
        env:
          PREVIEW_URL: ${{ needs.preview_check.outputs.preview_url }}
          VERCEL_BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          echo "Waiting for Vercel deployment to stabilize..."
          for i in $(seq 1 18); do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "x-vercel-protection-bypass: ${VERCEL_BYPASS}" \
              "${PREVIEW_URL}" 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $status"
            if [ "$status" != "000" ] && [ "$status" != "502" ] && [ "$status" != "503" ] && [ "$status" != "504" ]; then
              echo "Deployment is live (HTTP $status). Bypass handled by agent."
              exit 0
            fi
            sleep 10
          done
          echo "::warning::Could not verify deployment liveness, proceeding anyway."

      # danger-full-access: Codex needs network + filesystem for Playwright MCP
      # and writing artifacts. The prompt file contains security instructions to
      # constrain what the agent actually does.
      - name: Run Codex reviewer
        id: run_codex
        uses: openai/codex-action@0b91f4a2703c23df3102c3f0967d3c6db34eedef # v1
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          AI_TEST_USER_BROKER_TOKEN: ${{ secrets.AI_TEST_USER_BROKER_TOKEN }}
        with:
          openai-api-key: ${{ secrets.AZURE_API_KEY }}
          responses-api-endpoint: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          model: "gpt-5.4-2026-03-05"
          sandbox: "danger-full-access"
          safety-strategy: "unsafe"
          allow-users: ${{ vars.TNR_CODEX_ALLOW_USERS || 'MathiasGruber' }}
          prompt-file: ${{ steps.build_prompt.outputs.prompt_file }}

      # Always upload artifacts (screenshots, logs) even on failure for debugging
      - name: Upload TNR artifacts
        if: always()
        id: upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tnr-reviewer-pr-${{ needs.command_gate.outputs.pr_number }}-${{ github.run_id }}
          path: .artifacts
          if-no-files-found: warn
          retention-days: 7

      # Push screenshots to a dedicated orphan branch so they're viewable via
      # raw.githubusercontent.com URLs embedded directly in the PR comment.
      - name: Upload screenshots for PR comment
        if: always()
        id: upload_screenshots
        continue-on-error: true
        run: node "$RUNNER_TEMP/tnr-scripts/upload-screenshots.mjs"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          PR_NUMBER: ${{ needs.command_gate.outputs.pr_number }}
          SCREENSHOTS_DIR: .artifacts/screenshots

      # Replace the "started" comment with the final outcome (success/failure).
      # Uses the trusted script copy, not the PR-head version.
      - name: Update PR comment with result
        if: always()
        run: node "$RUNNER_TEMP/tnr-scripts/post-tnr-result.mjs"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ needs.command_gate.outputs.issue_number }}
          COMMENT_ID: ${{ needs.command_gate.outputs.comment_id }}
          RESULT: ${{ steps.run_codex.outcome == 'success' && 'success' || 'failed' }}
          MODE: ${{ env.MODE }}
          FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
          ARTIFACT_URL: ${{ steps.upload_artifacts.outputs.artifact-url }}
          SCREENSHOT_MARKDOWN: ${{ steps.upload_screenshots.outputs.screenshot_markdown }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
