name: Claude Review Trigger

on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      github.event.comment.body == '/claude-review' &&
      !endsWith(github.event.comment.user.login, '[bot]')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check and post review
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;
            
            // Check if already reviewed
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });
            
            const alreadyReviewed = comments.data.some(c => 
              c.user.login === 'github-actions[bot]' && 
              c.body.includes('@claude please review')
            );
            
            if (alreadyReviewed) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: '⚠️ Claude review has already been requested for this issue.'
              });
              return;
            }
            
            const body = `@claude please review this user request, and investigate it with respect to the codebase thoroughly. Based on your investigation, write an implementation plan. Make sure to highlight any uncertainties wrt. to implementation in the plan, and request follow-up information as needed. Post the entire implementation plan into the issue. Do not start implementing!`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: body
            });
