name: Add Claude Review Instructions

on:
  issues:
    types: [opened]

jobs:
  add-instructions:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add instructions
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 🤖 AI Review Available

            To request a Claude code review with implementation plan, comment:

            \`\`\`
            /claude-review
            \`\`\`

            > This command can only be used once per issue.

            ---

            **Need help clarifying this issue?** You can mention any of these AI assistants:
            - \`@claude\` - Claude AI
            - \`@cursor\` - Cursor AI  
            - \`@coderabbitai\` - CodeRabbit AI

            They can help detail requirements, suggest approaches, or answer questions about the codebase.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
