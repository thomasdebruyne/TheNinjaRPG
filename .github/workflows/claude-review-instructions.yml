name: Add Claude Review Instructions

on:
  issues:
    types: [opened]

jobs:
  add-instructions:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add instructions
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 🤖 AI Assistants Available

            **Need a code review or implementation plan?** Copy and paste this:

            \`\`\`
            @claude please review this issue and create your overall understanding of how this would fit into the codebase. Be sure to highlight main flow changes, UI components, UX flows, etc. Investigate it thoroughly with respect to the codebase. Be sure to 1. Highlight any uncertainties and request follow-up information as needed. 2. Highlight any potential concerns and request user input on them. 3. highlight any game mechanics / components which may need adaption / integration with this new feature . Do not start implementing, and do not go deep on implementation details - right now the most important thing is alignment with the user request, so as anything which may still need alignment.
            \`\`\`

            ---

            **Other AI assistants you can mention:**
            - \`claude\` - Claude AI (recommended for implementation plans)
            - \`cursor\` - Cursor AI  
            - \`coderabbitai\` - CodeRabbit AI

            They can help detail requirements, suggest approaches, or answer questions about the codebase.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
