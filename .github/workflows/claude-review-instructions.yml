name: Add Claude Review Instructions

on:
  issues:
    types: [opened]

jobs:
  add-instructions:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add instructions
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 🤖 AI Assistants Available

            **Need a code review or implementation plan?** Copy and paste this:

            \`\`\`
            @claude please review this issue and create an implementation plan. Investigate it thoroughly with respect to the codebase. Highlight any uncertainties and request follow-up information as needed. Do not start implementing!
            \`\`\`

            ---

            **Other AI assistants you can mention:**
            - \`@claude\` - Claude AI (recommended for implementation plans)
            - \`@cursor\` - Cursor AI  
            - \`@coderabbitai\` - CodeRabbit AI

            They can help detail requirements, suggest approaches, or answer questions about the codebase.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
